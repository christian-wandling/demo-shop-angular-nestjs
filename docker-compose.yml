name: demo-shop-angular-nestjs

services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - POSTGRES_DB
      - TZ=UTC
      - PGTZ=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.ops/docker/db/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend
      - shared
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'psql -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -c "SELECT 1" || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL
      - PGADMIN_DEFAULT_PASSWORD
      - PGADMIN_CONFIG_SERVER_MODE=False
    networks:
      - backend
    ports:
      - '127.0.0.1:${PGADMIN_PORT:-80}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
  api:
    command: sh -c "npx prisma generate && npx nx serve backend --watch --host=0.0.0.0"
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    environment:
      - PORT=3000
      - NODE_ENV=development
      - NX_DAEMON=false
      - ALLOWED_ORIGIN=http://localhost:${FRONTEND_PORT:-4200}
      - KEYCLOAK_REALM=demo_shop
      - KEYCLOAK_CLIENT_API=demo_shop_api
      - KEYCLOAK_URL=http://localhost:${KEYCLOAK_PORT:-8080}
      - KEYCLOAK_REALM_PUBLIC_KEY
      - SENTRY_AUTH_TOKEN
      - SENTRY_ORG
      - SENTRY_TRUSTED_DOMAIN=http://localhost
      - SENTRY_DEMO_SHOP_API_DSN
      - SENTRY_DEMO_SHOP_API_PROJECT
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    volumes:
      - .:/app:cached
      - /app/node_modules
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    networks:
      - backend
      - frontend
      - shared
    depends_on:
      db:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    command: start-dev --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/keycloak
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_LOG_LEVEL=info
      - KC_METRICS_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.ops/docker/keycloak/imports:/opt/keycloak/data/import
    ports:
      - '127.0.0.1:${KEYCLOAK_PORT:-8080}:8080'
    networks:
      - frontend
      - backend
      - shared

  frontend:
    command: npx nx serve frontend
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: dev
    environment:
      - API_URL=http://api:3000
      - NODE_ENV=development
      - KEYCLOAK_URL=http://localhost:${KEYCLOAK_PORT:-8080}
      - SENTRY_DEMO_SHOP_UI_DSN
      - SENTRY_TRUSTED_DOMAIN=http://localhost
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-4200}:4200'
    volumes:
      - .:/app:cached
      - /app/node_modules
    networks:
      - frontend
      - shared
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:

networks:
  frontend:
  backend:
  shared:
    external: true
