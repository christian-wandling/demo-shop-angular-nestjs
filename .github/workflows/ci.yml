name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CW_DEPLOY_BOT_ID }}
          private-key: ${{ secrets.CW_DEPLOY_BOT_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --ignore-scripts

      - run: npx prisma generate

      - name: Lint
        run: npx nx run-many -t lint

      - name: Test
        run: npx nx run-many -t test --codeCoverage

      - name: Build
        run: npx nx run-many -t build

      - name: Sonar
        uses: ./.github/actions/sonar
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  smoke:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: demo_shop
      POSTGRES_PASSWORD: demo_shop
      POSTGRES_DB: demo_shop

    steps:
      - uses: actions/checkout@v4

      - name: Create the shared network
        run: docker network create shared

      - name: Boot the stack
        run: docker compose up -d --wait --build db api

      - name: Apply migrations
        run: docker compose exec -T api npx prisma migrate deploy

      - name: Seed the database
        run: docker compose exec -T -e SEED_TARGETS=products api npx prisma db seed

      - name: Run the smoke test
        run: docker compose exec -T api npx nx run backend:smoke

      - name: Dump api logs on failure
        if: failure()
        run: docker compose logs api

      - name: Tear down
        if: always()
        run: docker compose down -v

  images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the api image
        run: docker build -f apps/backend/Dockerfile -t demo-shop-api:ci .

      - name: Build the frontend image
        run: docker build -f apps/frontend/Dockerfile -t demo-shop-frontend:ci .
